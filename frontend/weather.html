<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Weather Forecast</title>
  <!-- FOUC prevention: read stored theme and apply data-theme BEFORE the
       stylesheet is parsed so CSS variables resolve correctly on first paint.
       This script is intentionally self-contained — it must NOT reference
       theme.js or window.ThemeManager (the module is not yet loaded here).
       It does NOT write a default back to localStorage on first visit. -->
  <script>
    (function () {
      var stored = localStorage.getItem('theme-preference');
      var theme = (stored === 'black' || stored === 'white') ? stored : 'white';
      document.documentElement.setAttribute('data-theme', theme);
    }());
  </script>
  <link rel="stylesheet" href="weather.css" />
</head>
<body>
  <header>
    <h1>🌤️ US Cities Weather Forecast</h1>
    <p class="subtitle">Current conditions and forecast for major US cities</p>
    <!-- Theme toggle radio button control -->
    <fieldset class="theme-toggle" role="group">
      <legend class="visually-hidden">Choose colour theme</legend>
      <label class="theme-toggle__label">
        <input class="theme-toggle__radio" type="radio" name="theme" value="white" />
        White
      </label>
      <label class="theme-toggle__label">
        <input class="theme-toggle__radio" type="radio" name="theme" value="black" />
        Black
      </label>
    </fieldset>
  </header>

  <main>
    <section class="controls">
      <label for="filter-condition">Filter by condition:</label>
      <select id="filter-condition">
        <option value="">All Conditions</option>
        <option value="Sunny">Sunny</option>
        <option value="Partly Cloudy">Partly Cloudy</option>
        <option value="Cloudy">Cloudy</option>
        <option value="Rainy">Rainy</option>
        <option value="Stormy">Stormy</option>
        <option value="Windy">Windy</option>
      </select>

      <label for="sort-by">Sort by:</label>
      <select id="sort-by">
        <option value="city">City</option>
        <option value="temperature">Temperature</option>
        <option value="humidity">Humidity</option>
        <option value="windSpeed">Wind Speed</option>
      </select>
    </section>

    <section class="table-container">
      <table id="weather-table">
        <thead>
          <tr>
            <th>City</th>
            <th>State</th>
            <th>Condition</th>
            <th>Temperature (°F)</th>
            <th>Humidity (%)</th>
            <th>Wind Speed (mph)</th>
            <th>Forecast Date</th>
          </tr>
        </thead>
        <tbody id="weather-body">
        </tbody>
      </table>
    </section>

    <p id="no-results" class="no-results hidden">No cities match the selected condition.</p>
  </main>

  <footer>
    <p>Data is for demonstration purposes only. Last updated: <span id="last-updated"></span></p>
  </footer>

  <script src="theme.js"></script>
  <script src="weather.js"></script>
  <script>
    (function () {
      var filterSelect = document.getElementById('filter-condition');
      var sortSelect = document.getElementById('sort-by');
      var tbody = document.getElementById('weather-body');
      var noResults = document.getElementById('no-results');
      document.getElementById('last-updated').textContent = new Date().toLocaleDateString('en-US');

      // Pre-select the radio button that matches the stored/active theme,
      // then attach the change handler for live theme switching.
      var stored = window.ThemeManager.getStoredTheme();
      var themeRadios = document.querySelectorAll('input[name="theme"]');
      var i;
      for (i = 0; i < themeRadios.length; i++) {
        themeRadios[i].checked = (themeRadios[i].value === stored);
        themeRadios[i].addEventListener('change', function () {
          window.ThemeManager.toggleTheme(this.value);
        });
      }

      function render() {
        var condition = filterSelect.value;
        var sortKey = sortSelect.value;
        var data = WeatherApp.getFilteredData(condition, sortKey);

        tbody.innerHTML = '';
        if (data.length === 0) {
          noResults.classList.remove('hidden');
        } else {
          noResults.classList.add('hidden');
          data.forEach(function (row) {
            var tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + row.city + '</td>' +
              '<td>' + row.state + '</td>' +
              '<td><span class="badge badge-' + row.condition.toLowerCase().replace(/ /g, '-') + '">' + row.condition + '</span></td>' +
              '<td>' + row.temperature + '</td>' +
              '<td>' + row.humidity + '</td>' +
              '<td>' + row.windSpeed + '</td>' +
              '<td>' + row.forecastDate + '</td>';
            tbody.appendChild(tr);
          });
        }
      }

      filterSelect.addEventListener('change', render);
      sortSelect.addEventListener('change', render);
      render();
    }());
  </script>
</body>
</html>
